<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Global Energy | Samantha Hordyk</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <div class="header-left"></div>
        <ul class="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="projects.html" class="active">Projects</a></li>
          <li><a href="work.html">Work</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main class="pj-page">
      <div class="pj-inner">
        <a href="projects.html" class="project-breadcrumb">&#8592; Projects</a>

        <header class="pj-header">
          <h1>Global Energy</h1>
        </header>

        <div class="pj-layout">

          <aside class="pj-sidebar">
            <div class="scope-box">
              <p class="scope-label">SCOPE</p>
              <dl class="scope-list">
                <dt>Purpose</dt>
                <dd></dd>
                <dt>Length</dt>
                <dd></dd>
                <dt>Status</dt>
                <dd></dd>
                <dt>Tools</dt>
                <dd></dd>
              </dl>
            </div>
          </aside>

          <div class="pj-body">

            <section class="pj-section">
              <div class="pj-fig-grid">
                <figure class="pj-fig-placeholder" style="grid-column: 1 / -1; margin-left: -4rem; margin-right: -4rem;">
                  <img src="assets/Energy/displacement_diverging.png" alt="Energy displacement diverging chart" style="width:100%;border-radius:10px;display:block;" />
                </figure>
                <figure class="pj-fig-placeholder" style="grid-column: 1 / -1; margin-left: -4rem; margin-right: -4rem;">
                  <img src="assets/Energy/marimekko.png" alt="Energy marimekko chart" style="width:100%;border-radius:10px;display:block;" />
                </figure>
                <figure class="pj-fig-placeholder" style="grid-column: 1 / -1;">
                  <img src="assets/Energy/donut_global_mix.png" alt="Global energy mix donut chart" style="width:100%;border-radius:10px;display:block;" />
                </figure>
              </div>
            </section>

          </div><!-- /pj-body -->

        </div><!-- /pj-layout -->

        <div class="project-actions">
          <a href="projects.html" class="button button-outline">&#8592; Back to projects</a>
        </div>
      </div><!-- /pj-inner -->
    </main>

    <script src="script.js"></script>
